# Production gates — runs on every PR that targets `main`.
#
# Mechanical checks only (build + lint). Cognitive gates (code-review,
# QA mental walkthrough, gatekeeper) live in CLAUDE.md and run inside a
# Claude session, before the PR is opened.
#
# A failure here blocks the merge button in GitHub UI when branch
# protection is enabled (Settings → Branches → main → "Require status
# checks to pass before merging" → select "build" and "lint").

name: Production gates

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # Lint must be clean for a production merge — see CLAUDE.md
      # ("חוב lint קיים — חוק --no-verify"). Bypass is permitted only on
      # pushes to the `staging` branch, never on PRs into `main`.
      - run: npm run lint

  query-timeouts:
    name: Query timeout gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # No npm install needed — the script is plain Node, no
      # dependencies. Failing here means new code introduced a
      # Supabase call inside a useQuery body without a timeout
      # wrapper. See scripts/check-query-timeouts.cjs and
      # CLAUDE.md gate "Query Timeout Gate".
      - run: node scripts/check-query-timeouts.cjs

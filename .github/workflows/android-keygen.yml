name: Android Keygen (one-time)

# One-time helper to create a NEW Android upload key WITHOUT any local
# tools (no Android Studio, no JDK install). Click "Run workflow",
# download the two artifacts, upload the certificate to Play Console
# (upload key reset), and paste the base64 keystore as the
# ANDROID_KEYSTORE_BASE64 secret. Safe to delete this workflow once done.
#
# Set these two repository secrets BEFORE running (passwords you choose):
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_PASSWORD

on:
  workflow_dispatch:

jobs:
  keygen:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate upload keystore + certificate
        env:
          STOREPASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEYPASS:   ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$STOREPASS" ] || [ -z "$KEYPASS" ]; then
            echo "ERROR: set ANDROID_KEYSTORE_PASSWORD and ANDROID_KEY_PASSWORD secrets first."; exit 1
          fi
          keytool -genkeypair -v \
            -keystore upload-keystore.jks \
            -alias upload \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass:env STOREPASS \
            -keypass:env KEYPASS \
            -dname "CN=CarReminder, OU=Mobile, O=CarReminder, L=Tel Aviv, C=IL"
          keytool -export -rfc \
            -keystore upload-keystore.jks \
            -alias upload \
            -file upload_certificate.pem \
            -storepass:env STOREPASS
          base64 -w0 upload-keystore.jks > keystore-base64.txt
          echo "Done."

      - name: Artifact - certificate for Google Play
        uses: actions/upload-artifact@v4
        with:
          name: upload_certificate
          path: upload_certificate.pem
          retention-days: 7

      - name: Artifact - keystore base64 (paste as secret)
        uses: actions/upload-artifact@v4
        with:
          name: keystore-base64
          path: keystore-base64.txt
          retention-days: 7
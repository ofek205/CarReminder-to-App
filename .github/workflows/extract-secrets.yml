name: Extract Apple Secrets (one-shot bootstrap — DELETE AFTER USE)

# TEMPORARY workflow. Pulls the three Apple credentials needed to build
# the iOS app locally on a Mac and bundles them into a single artifact
# with 1-day retention. Once the user has downloaded the artifact this
# workflow MUST be deleted along with its run history.
#
# Trigger: Actions tab → "Extract Apple Secrets" → Run workflow.
#
# What ends up in the artifact:
#   distribution.p12                 — Apple Distribution cert (private key)
#   AuthKey_<KEY_ID>.p8              — App Store Connect API key
#   *.mobileprovision                — App Store provisioning profile
#                                       (downloaded fresh from Apple)
#   metadata.txt                     — KEY_ID, ISSUER_ID, profile name,
#                                       cert password (plaintext)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Materialize .p12 cert and .p8 API key from base64 secrets
        env:
          CERT_B64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          KEY_B64:  ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          KEY_ID:   ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          set -euo pipefail
          mkdir -p out
          echo "$CERT_B64" | base64 -d > out/distribution.p12
          echo "$KEY_B64"  | base64 -d > "out/AuthKey_${KEY_ID}.p8"
          echo "Decoded files:"
          ls -la out/

      - name: Prepare API key as PEM for the profile-download action
        id: pem
        env:
          KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          DECODED=$(echo -n "$KEY_B64" | base64 --decode)
          echo "::add-mask::$DECODED"
          {
            echo 'pem<<APPLE_KEY_EOF'
            echo "$DECODED"
            echo 'APPLE_KEY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Download App Store provisioning profile from Apple
        uses: apple-actions/download-provisioning-profiles@v3
        with:
          bundle-id:           com.carreminders.app
          profile-type:        IOS_APP_STORE
          issuer-id:           ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id:          ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key:     ${{ steps.pem.outputs.pem }}

      - name: Copy the downloaded profile into the artifact directory
        run: |
          set -euo pipefail
          # The action writes to one of a few locations depending on OS;
          # search the most likely places and copy whatever it produced.
          FOUND=""
          for path in \
            ./*.mobileprovision \
            ./profile/*.mobileprovision \
            "$HOME"/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision \
            "$HOME"/profile/*.mobileprovision; do
            if [ -f "$path" ]; then
              cp "$path" out/
              echo "Copied profile from: $path"
              FOUND=1
            fi
          done
          if [ -z "$FOUND" ]; then
            echo "::warning::No .mobileprovision found in the usual paths."
            echo "Falling back to a recursive search rooted at \$HOME and the workspace:"
            find "$HOME" "$GITHUB_WORKSPACE" -name '*.mobileprovision' -type f 2>/dev/null | tee located.txt
            while IFS= read -r p; do
              [ -f "$p" ] && cp "$p" out/ && echo "Copied: $p"
            done < located.txt
          fi
          echo "Artifact directory now contains:"
          ls -la out/

      - name: Write plaintext metadata
        env:
          KEY_ID:       ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ISSUER:       ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PROFILE_NAME: ${{ secrets.IOS_PROFILE_NAME }}
          CERT_PASS:    ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          {
            echo "# Apple credentials metadata"
            echo "# DELETE THIS FILE FROM ANY DISK AS SOON AS THE VAULT IS POPULATED."
            echo
            echo "KEY_ID=$KEY_ID"
            echo "ISSUER_ID=$ISSUER"
            echo "PROFILE_NAME=$PROFILE_NAME"
            echo "CERT_PASSWORD=$CERT_PASS"
          } > out/metadata.txt
          echo "metadata.txt written."

      - name: Upload bundled secrets as a single artifact (1-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: apple-secrets
          path: out/
          retention-days: 1
          if-no-files-found: error

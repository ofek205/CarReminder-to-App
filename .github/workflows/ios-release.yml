name: iOS Release

# Builds the iOS app on a free GitHub-hosted macOS runner and uploads
# it to App Store Connect (TestFlight). Uses MANUAL signing — a
# Distribution certificate (.p12) and an App Store provisioning
# profile are imported into the runner keychain at build time.
#
# This replaces the previous automatic-signing flow. Automatic
# signing during `xcodebuild archive` unconditionally tries to also
# issue an iOS Development profile, which Apple's service refuses
# for Individual accounts that have no devices registered. Manual
# signing skips that step entirely.
#
# Trigger: manually from the Actions tab. Optionally bump the build
# number via the `build_number` input.
#
# Secrets required (Settings → Secrets and variables → Actions):
#   APP_STORE_CONNECT_API_KEY_ID       — 10-char Key ID
#   APP_STORE_CONNECT_ISSUER_ID        — UUID Issuer ID
#   APP_STORE_CONNECT_API_KEY_BASE64   — base64 of the .p8 key file
#   IOS_DIST_CERT_BASE64               — base64 of the Apple Distribution .p12
#   IOS_DIST_CERT_PASSWORD             — export password for the .p12
#   IOS_PROFILE_NAME                   — exact name of the App Store provisioning profile
#                                        (must match PROVISIONING_PROFILE_SPECIFIER in pbxproj)

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (leave blank to auto-increment from current)'
        required: false
        type: string

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Select latest Xcode 16
        # App Store Connect rejects iOS 17.5 SDK builds; need iOS 18 SDK,
        # which ships in Xcode 16. macos-15 has multiple Xcode 16.x installs
        # under /Applications/Xcode_16*.app — pick the highest version that
        # exists rather than hardcoding a path.
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "ERROR: no Xcode 16.x found under /Applications. Available:"
            ls -d /Applications/Xcode*.app 2>/dev/null
            exit 1
          fi
          echo "Selecting $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Sync Capacitor → iOS
        run: npx cap sync ios

      - name: Verify web bundle was synced
        run: |
          test -f ios/App/App/public/index.html \
            || (echo "ERROR: ios/App/App/public/index.html missing — cap sync did not copy the web bundle."; exit 1)
          echo "Web bundle present: $(ls -la ios/App/App/public/index.html)"

      - name: Install CocoaPods dependencies
        # Compiles Capacitor + plugins from local source via CocoaPods. SPM
        # cannot handle Capacitor's mixed Swift+ObjC target on Xcode 15.x, and
        # the upstream binary xcframework drops public-extension symbols, so
        # CocoaPods is the only working integration on this stack.
        working-directory: ios/App
        run: pod install --repo-update

      - name: Set unique build number (per CI run)
        working-directory: ios/App
        env:
          RUN_NUMBER: ${{ github.run_number }}
          USER_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          if [ -n "$USER_BUILD_NUMBER" ]; then
            NEW_BUILD="$USER_BUILD_NUMBER"
          else
            NEW_BUILD=$((100 + RUN_NUMBER))
          fi
          echo "Setting build number to $NEW_BUILD"
          xcrun agvtool new-version -all "$NEW_BUILD"

      - name: Import Apple Distribution certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          p12-password:    ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Decode API key for download-provisioning-profiles
        id: api_key_pem
        env:
          API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          # The download-provisioning-profiles action expects the raw .p8
          # PEM contents as a string, not a base64 encoding. Decode the
          # secret here, mask the decoded value in logs, and expose it
          # as a step output for the next step to consume.
          DECODED=$(echo -n "$API_KEY_B64" | base64 --decode)
          echo "::add-mask::$DECODED"
          {
            echo 'pem<<APPLE_KEY_EOF'
            echo "$DECODED"
            echo 'APPLE_KEY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Download App Store provisioning profile
        uses: apple-actions/download-provisioning-profiles@v3
        with:
          bundle-id:           com.carreminders.app
          profile-type:        IOS_APP_STORE
          issuer-id:           ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id:          ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key:     ${{ steps.api_key_pem.outputs.pem }}

      - name: Decode App Store Connect API key (for altool upload)
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          mkdir -p ~/private_keys
          cp ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 ~/private_keys/

      - name: Archive (xcodebuild, manual signing)
        working-directory: ios/App
        # CocoaPods generates App.xcworkspace; archiving must use the
        # workspace, not the bare project, so the Pods target is linked.
        # Manual-signing settings live in pbxproj on the App target's
        # Release configuration; we don't pass them via cmdline so they
        # only apply to App, not to the auto-generated Pods targets
        # (which don't accept provisioning profiles).
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination 'generic/platform=iOS' \
            archive

      - name: Export IPA
        working-directory: ios/App
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to App Store Connect
        env:
          API_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID:  ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_PATH=$(ls $RUNNER_TEMP/export/*.ipa | head -1)
          echo "Uploading $IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey ${API_KEY_ID} \
            --apiIssuer ${API_ISSUER_ID}

      - name: Cleanup API key
        if: always()
        run: |
          rm -f ~/private_keys/*.p8
          rm -f ~/.appstoreconnect/private_keys/*.p8

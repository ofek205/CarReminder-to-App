name: iOS Release

# Builds the iOS app on a free GitHub-hosted macOS runner and uploads
# it to App Store Connect (TestFlight). Uses MANUAL signing — a
# Distribution certificate (.p12) and an App Store provisioning
# profile are imported into the runner keychain at build time.
#
# This replaces the previous automatic-signing flow. Automatic
# signing during `xcodebuild archive` unconditionally tries to also
# issue an iOS Development profile, which Apple's service refuses
# for Individual accounts that have no devices registered. Manual
# signing skips that step entirely.
#
# Trigger: manually from the Actions tab. Optionally bump the build
# number via the `build_number` input.
#
# Secrets required (Settings → Secrets and variables → Actions):
#   APP_STORE_CONNECT_API_KEY_ID       — 10-char Key ID
#   APP_STORE_CONNECT_ISSUER_ID        — UUID Issuer ID
#   APP_STORE_CONNECT_API_KEY_BASE64   — base64 of the .p8 key file
#   IOS_DIST_CERT_BASE64               — base64 of the Apple Distribution .p12
#   IOS_DIST_CERT_PASSWORD             — export password for the .p12
#   IOS_PROFILE_NAME                   — exact name of the App Store provisioning profile
#                                        (must match PROVISIONING_PROFILE_SPECIFIER in pbxproj)

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (leave blank to auto-increment from current)'
        required: false
        type: string

jobs:
  build:
    # macos-26 is required because Apple now mandates iOS 26 SDK for all
    # App Store uploads (effective Apr 28, 2026). The previous macos-15
    # runner only ships Xcode 16.x with the iOS 18.5 SDK, which the
    # App Store Connect upload validator now rejects with:
    #   "All iOS and iPadOS apps must be built with the iOS 26 SDK or
    #    later, included in Xcode 26 or later."
    # macos-26 is GA since Feb 2026 and ships Xcode 26.0/.1/.2/.3/.4.
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Select Xcode 26.4 (stable, iOS 26.4 SDK) + pin DEVELOPER_DIR
        # IMPORTANT: this step does THREE things, in order, and any of them
        # failing must fail the whole job. Previous attempts only did
        # `sudo xcode-select -s`, which the App Store altool then ignored
        # — App Store Connect still rejected the upload because the IPA
        # was built against the iOS 18.5 SDK (Xcode 16.4). That is only
        # possible if either:
        #   (a) the runner image has DEVELOPER_DIR pre-set to an older
        #       Xcode and xcodebuild prefers DEVELOPER_DIR over xcode-select, or
        #   (b) some apple-actions step earlier in the pipeline reset it.
        # Either way, the bullet-proof fix is to set DEVELOPER_DIR in
        # $GITHUB_ENV so EVERY subsequent step inherits it, then to
        # actively assert that xcrun resolves iphoneos26.x before we
        # waste time archiving.
        #
        # Runner trap to avoid: macos-26 has Xcode 26.5 *beta* exposed via
        # symlinks like /Applications/Xcode_26.5.app whose own filename
        # does NOT contain "beta". A naive
        # `ls Xcode_26*.app | grep -v beta | sort -V | tail -1`
        # silently picks the beta, and the beta's iOS 26.5 platform isn't
        # fully provisioned for headless `xcodebuild archive`. Pin to 26.4
        # explicitly — it ships with iOS 26.4 SDK, which is current Apple
        # App Store-acceptable.
        run: |
          set -euo pipefail
          echo "=== All Xcode 26.x installs on this runner ==="
          for app in /Applications/Xcode_26*.app; do
            if [ -L "$app" ]; then
              target=$(readlink "$app")
              echo "  $app -> $target  (symlink)"
            elif [ -d "$app" ]; then
              echo "  $app  (directory)"
            fi
          done
          echo
          echo "=== Inherited DEVELOPER_DIR (before our override) ==="
          echo "DEVELOPER_DIR='${DEVELOPER_DIR:-<unset>}'"
          echo "xcode-select -p (before): $(xcode-select -p 2>/dev/null || echo '<none>')"
          echo

          if [ -d /Applications/Xcode_26.4.app ]; then
            XCODE_PATH=/Applications/Xcode_26.4.app
          elif [ -d /Applications/Xcode_26.4.1.app ]; then
            XCODE_PATH=/Applications/Xcode_26.4.1.app
          else
            echo "ERROR: Xcode 26.4 not found on macos-26 runner."
            echo "The runner image may have changed; pick a different stable 26.x explicitly."
            exit 1
          fi

          echo "Selecting $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"

          # Critical: export DEVELOPER_DIR for every subsequent step.
          # xcodebuild prefers DEVELOPER_DIR over xcode-select when both
          # are set; the runner image may set DEVELOPER_DIR by default,
          # which would silently override our xcode-select choice.
          DEV_DIR="$XCODE_PATH/Contents/Developer"
          echo "DEVELOPER_DIR=$DEV_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$DEV_DIR"

          echo "=== xcode-select -p (after) ==="
          xcode-select -p
          echo "=== DEVELOPER_DIR (after, exported) ==="
          echo "$DEVELOPER_DIR"
          echo "=== xcodebuild -version ==="
          xcodebuild -version
          echo "=== xcrun iphoneos SDK ==="
          IPHONE_SDK="$(xcrun --sdk iphoneos --show-sdk-version)"
          IPHONE_PLAT="$(xcrun --sdk iphoneos --show-sdk-platform-version)"
          echo "iphoneos SDK version:      $IPHONE_SDK"
          echo "iphoneos platform version: $IPHONE_PLAT"
          echo "=== xcodebuild -showsdks (iOS only) ==="
          xcodebuild -showsdks 2>/dev/null | grep -i iphoneos || true

          # Hard assert: bail BEFORE archive if anything resolved to a
          # non-26 SDK. Better to fail at minute 1 with a clear diagnostic
          # than to fail at minute 4 during App Store upload validation
          # with a cryptic "iOS 18.5 SDK" error after the IPA is already
          # signed.
          case "$IPHONE_SDK" in
            26.*)
              echo "OK: iOS SDK is $IPHONE_SDK — App Store accepts."
              ;;
            *)
              echo "FATAL: iOS SDK resolved to '$IPHONE_SDK', expected 26.x."
              echo "       App Store will reject this build."
              echo "       xcode-select / DEVELOPER_DIR did not take effect."
              exit 1
              ;;
          esac

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Sync Capacitor → iOS
        run: npx cap sync ios

      - name: Verify web bundle was synced
        run: |
          test -f ios/App/App/public/index.html \
            || (echo "ERROR: ios/App/App/public/index.html missing — cap sync did not copy the web bundle."; exit 1)
          echo "Web bundle present: $(ls -la ios/App/App/public/index.html)"

      - name: Install CocoaPods dependencies
        # Compiles Capacitor + plugins from local source via CocoaPods. SPM
        # cannot handle Capacitor's mixed Swift+ObjC target on Xcode 15.x, and
        # the upstream binary xcframework drops public-extension symbols, so
        # CocoaPods is the only working integration on this stack.
        working-directory: ios/App
        run: pod install --repo-update

      - name: Set unique build number (per CI run)
        working-directory: ios/App
        env:
          RUN_NUMBER: ${{ github.run_number }}
          USER_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          if [ -n "$USER_BUILD_NUMBER" ]; then
            NEW_BUILD="$USER_BUILD_NUMBER"
          else
            NEW_BUILD=$((100 + RUN_NUMBER))
          fi
          echo "Setting build number to $NEW_BUILD"
          xcrun agvtool new-version -all "$NEW_BUILD"

      - name: Import Apple Distribution certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          p12-password:    ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Decode API key for download-provisioning-profiles
        id: api_key_pem
        env:
          API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          # The download-provisioning-profiles action expects the raw .p8
          # PEM contents as a string, not a base64 encoding. Decode the
          # secret here, mask the decoded value in logs, and expose it
          # as a step output for the next step to consume.
          DECODED=$(echo -n "$API_KEY_B64" | base64 --decode)
          echo "::add-mask::$DECODED"
          {
            echo 'pem<<APPLE_KEY_EOF'
            echo "$DECODED"
            echo 'APPLE_KEY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Download App Store provisioning profile
        uses: apple-actions/download-provisioning-profiles@v3
        with:
          bundle-id:           com.carreminders.app
          profile-type:        IOS_APP_STORE
          issuer-id:           ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id:          ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key:     ${{ steps.api_key_pem.outputs.pem }}

      - name: Decode App Store Connect API key (for altool upload)
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          mkdir -p ~/private_keys
          cp ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 ~/private_keys/

      - name: Archive (xcodebuild, manual signing)
        working-directory: ios/App
        # CocoaPods generates App.xcworkspace; archiving must use the
        # workspace, not the bare project, so the Pods target is linked.
        # Manual-signing settings live in pbxproj on the App target's
        # Release configuration; we don't pass them via cmdline so they
        # only apply to App, not to the auto-generated Pods targets
        # (which don't accept provisioning profiles).
        #
        # `-sdk iphoneos` is passed explicitly so xcodebuild uses the
        # iphoneos SDK from the active Xcode (26.4) and never silently
        # picks an older one. Combined with the Select-Xcode step's
        # DEVELOPER_DIR export this gives us two independent guarantees
        # that the archive lands on iOS 26.4 SDK.
        run: |
          set -euo pipefail
          echo "Archive will use:"
          echo "  DEVELOPER_DIR=${DEVELOPER_DIR:-<unset>}"
          echo "  xcodebuild   =$(xcrun -f xcodebuild)"
          echo "  iphoneos SDK =$(xcrun --sdk iphoneos --show-sdk-version)"
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            archive

      - name: Export IPA
        working-directory: ios/App
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to App Store Connect
        env:
          API_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID:  ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_PATH=$(ls $RUNNER_TEMP/export/*.ipa | head -1)
          echo "Uploading $IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey ${API_KEY_ID} \
            --apiIssuer ${API_ISSUER_ID}

      - name: Cleanup API key
        if: always()
        run: |
          rm -f ~/private_keys/*.p8
          rm -f ~/.appstoreconnect/private_keys/*.p8

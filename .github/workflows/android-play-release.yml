name: Android Play Release

# Builds a SIGNED release AAB (Android App Bundle) on a GitHub-hosted
# Ubuntu runner and uploads it to Google Play via the Play Developer
# API. This is the Play-Store counterpart to android-build.yml (which
# only produces a debug APK for side-loading).
#
# Trigger: manually from the Actions tab (workflow_dispatch). Pick the
# track (internal / alpha / beta / production) at dispatch time.
#
# Version: versionName + versionCode are derived from package.json by
# android/app/build.gradle — no manual bump here.
#
# ── Secrets required ───────────────────────────────────────────────
# Already configured (shared with android-build / iOS):
#   VITE_SUPABASE_URL            — baked into the web bundle
#   VITE_SUPABASE_ANON_KEY       — baked into the web bundle
#   ANDROID_KEYSTORE_BASE64      — base64 of the release upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD    — keystore password
#   ANDROID_KEY_ALIAS            — key alias inside the keystore
#   ANDROID_KEY_PASSWORD         — key password
# MUST BE ADDED (one-time, by the repo owner):
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
#       — the full JSON of a Google Cloud service account that has been
#         granted release access in the Play Console (Users & permissions).
#
# ── Play App Signing note ──────────────────────────────────────────
# The AAB is signed here with ANDROID_KEYSTORE_BASE64. For the upload to
# be accepted, that keystore must be the UPLOAD key registered for
# com.carreminder.app under Play App Signing. If Play was previously fed
# by a different key, either use that key here or reset the upload key in
# the Play Console (Setup → App signing → request upload key reset).

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play track to release to'
        required: true
        type: choice
        default: internal
        options: [internal, alpha, beta, production]
      status:
        description: 'Release status (completed = roll out now; draft = stage in Play Console)'
        required: true
        type: choice
        default: completed
        options: [completed, draft]
      ref:
        description: 'Git ref to build (tag/branch/SHA). Empty = current ref.'
        required: false
        type: string
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Sync Capacitor → Android
        run: npx cap sync android

      - name: Verify web bundle was synced
        run: |
          test -f android/app/src/main/assets/public/index.html \
            || (echo "ERROR: android/app/src/main/assets/public/index.html missing — cap sync did not copy the web bundle."; exit 1)
          echo "Web bundle present: $(ls -la android/app/src/main/assets/public/index.html)"

      - name: Decode release keystore
        # Materialise the upload keystore from the base64 secret into a
        # temp file outside the workspace so it never lands in an artifact.
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 secret is empty."; exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
          echo "Keystore written ($(stat -c%s "$RUNNER_TEMP/upload-keystore.jks") bytes)"

      - name: Build signed release AAB
        working-directory: android
        # Signing is injected on the command line via the standard
        # android.injected.signing.* properties — no signingConfig needed
        # in build.gradle. Produces a signed app-release.aab.
        env:
          KS_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS:   ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/upload-keystore.jks" \
            -Pandroid.injected.signing.store.password="$KS_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Guard against Google Play media-permission rejection
        # Same hard gate as android-build.yml — Play rejected v4.6.8 over
        # READ_MEDIA_* permissions merged in by a library. Fail at build
        # time rather than at Play Console review.
        run: bash scripts/check-android-permissions.sh

      - name: Locate AAB
        id: locate_aab
        run: |
          AAB_PATH=$(ls android/app/build/outputs/bundle/release/*.aab | head -1)
          if [ -z "$AAB_PATH" ]; then
            echo "ERROR: no AAB produced under android/app/build/outputs/bundle/release/"
            exit 1
          fi
          echo "Found $AAB_PATH"
          echo "aab_path=$AAB_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload AAB as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: ${{ steps.locate_aab.outputs.aab_path }}
          retention-days: 90

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.carreminder.app
          releaseFiles: ${{ steps.locate_aab.outputs.aab_path }}
          track: ${{ github.event.inputs.track }}
          status: ${{ github.event.inputs.status }}

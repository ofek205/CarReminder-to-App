<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark green background -->
  <rect width="512" height="512" rx="100" fill="#2D3B2D"/>

  <!-- Car body - yellow pickup truck style -->
  <g transform="translate(256, 260)">
    <!-- Truck bed -->
    <path d="M30,-30 L130,-30 L130,25 L-140,25 L-140,-30 L-60,-30 L-60,-70 L-30,-90 L60,-90 L80,-70 L80,-30 Z"
          fill="#E8B829" stroke="none"/>
    <!-- Cabin -->
    <path d="M-60,-30 L-60,-70 L-30,-90 L60,-90 L80,-70 L80,-30 Z"
          fill="#D4A520"/>
    <!-- Window -->
    <path d="M-45,-35 L-45,-62 L-22,-80 L55,-80 L68,-65 L68,-35 Z"
          fill="#2D3B2D" opacity="0.6"/>
    <!-- Hood -->
    <path d="M80,-30 L130,-30 L140,-15 L140,25 L80,25 Z"
          fill="#E8B829"/>
    <!-- Truck bed back -->
    <path d="M-140,-30 L-100,-30 L-100,25 L-140,25 Z"
          fill="#D4A520"/>
    <!-- Bumper front -->
    <rect x="135" y="-5" width="15" height="25" rx="3" fill="#D4A520"/>
    <!-- Bumper back -->
    <rect x="-150" y="-5" width="12" height="25" rx="3" fill="#D4A520"/>
    <!-- Headlight -->
    <rect x="130" y="-20" width="12" height="14" rx="3" fill="#FFF5CC"/>
    <!-- Taillight -->
    <rect x="-142" y="-20" width="8" height="14" rx="3" fill="#FF6B6B" opacity="0.8"/>
    <!-- Wheels -->
    <circle cx="-80" cy="30" r="28" fill="#1a1a1a"/>
    <circle cx="-80" cy="30" r="18" fill="#333"/>
    <circle cx="-80" cy="30" r="8" fill="#555"/>
    <circle cx="90" cy="30" r="28" fill="#1a1a1a"/>
    <circle cx="90" cy="30" r="18" fill="#333"/>
    <circle cx="90" cy="30" r="8" fill="#555"/>
    <!-- Wheel arch shadows -->
    <path d="M-108,25 Q-80,0 -52,25" fill="none" stroke="#2D3B2D" stroke-width="4"/>
    <path d="M62,25 Q90,0 118,25" fill="none" stroke="#2D3B2D" stroke-width="4"/>
  </g>

  <!-- Light bulb / reminder icon above car -->
  <g transform="translate(290, 130)">
    <!-- Bulb glow -->
    <circle cx="0" cy="0" r="30" fill="#E8B829" opacity="0.2"/>
    <!-- Bulb body -->
    <path d="M0,-28 C-18,-28 -22,-10 -22,0 C-22,10 -14,16 -10,20 L10,20 C14,16 22,10 22,0 C22,-10 18,-28 0,-28 Z"
          fill="#E8B829"/>
    <!-- Bulb base -->
    <rect x="-8" y="20" width="16" height="6" rx="2" fill="#D4A520"/>
    <rect x="-6" y="26" width="12" height="4" rx="2" fill="#D4A520"/>
    <!-- Bulb filament/rays -->
    <line x1="0" y1="-38" x2="0" y2="-32" stroke="#E8B829" stroke-width="3" stroke-linecap="round"/>
    <line x1="-18" y1="-32" x2="-14" y2="-27" stroke="#E8B829" stroke-width="3" stroke-linecap="round"/>
    <line x1="18" y1="-32" x2="14" y2="-27" stroke="#E8B829" stroke-width="3" stroke-linecap="round"/>
    <line x1="-28" y1="-10" x2="-24" y2="-7" stroke="#E8B829" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="-10" x2="24" y2="-7" stroke="#E8B829" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>

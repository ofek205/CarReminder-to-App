<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#16A34A"/>

  <!-- Car silhouette -->
  <g transform="translate(256, 240)">
    <!-- Car body -->
    <path d="M-130,20 L-120,-20 L-80,-60 L80,-60 L120,-20 L130,20 L130,40 L-130,40 Z"
          fill="white" opacity="0.95"/>
    <!-- Windows -->
    <path d="M-70,-15 L-55,-50 L-5,-50 L-5,-15 Z" fill="#16A34A" opacity="0.6"/>
    <path d="M5,-15 L5,-50 L65,-50 L75,-15 Z" fill="#16A34A" opacity="0.6"/>
    <!-- Wheels -->
    <circle cx="-80" cy="45" r="25" fill="white" opacity="0.9"/>
    <circle cx="-80" cy="45" r="15" fill="#16A34A"/>
    <circle cx="80" cy="45" r="25" fill="white" opacity="0.9"/>
    <circle cx="80" cy="45" r="15" fill="#16A34A"/>
    <!-- Headlights -->
    <rect x="115" y="-10" width="20" height="15" rx="3" fill="#FDE047"/>
    <rect x="-135" y="-10" width="20" height="15" rx="3" fill="#FDE047"/>
  </g>

  <!-- Bell / Reminder icon -->
  <g transform="translate(380, 120)">
    <path d="M0,-45 C-20,-45 -35,-30 -35,-10 L-35,10 C-35,15 -40,20 -45,25 L45,25 C40,20 35,15 35,10 L35,-10 C35,-30 20,-45 0,-45 Z"
          fill="white" opacity="0.9"/>
    <circle cx="0" cy="35" r="10" fill="white" opacity="0.9"/>
    <line x1="0" y1="-55" x2="0" y2="-45" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Text -->
  <text x="256" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" opacity="0.95">
    CarReminders
  </text>
</svg>

<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!--
      `maximum-scale=1.0, user-scalable=no` blocks iOS WKWebView's
      automatic zoom-on-focus, which kicks in whenever the user taps
      an input whose computed font-size is below 16px. Our shadcn UI
      defaults (Input/Textarea/Select) all use `text-sm` (14px) for
      visual density, so the zoom fired on every form field — and
      crucially didn't reset after blur on WKWebView, leaving the
      page stuck at 1.2x with horizontal scroll. Symptom users saw
      on TestFlight after using the AI chat input.

      In-app font scaling is handled by AccessibilityContext
      (-2 … +5 via the floating A11y button), so users keep
      accessible text sizing without relying on browser pinch-zoom.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#16A34A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="CarReminders - אפליקציה לניהול רכבים, תזכורות טיפולים, ביטוח וטסט" />
    <link rel="icon" type="image/png" href="./icons/icon-96x96.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />
    <link rel="manifest" href="./manifest.json" />
    <title>CarReminders</title>
  </head>
  <body>
    <!--
      Inline boot loader. React replaces #root contents on mount, but if
      anything in main.jsx throws synchronously OR the JS bundle takes >2s
      to parse on a cold native launch, this branded screen is what the
      user sees instead of pure white. App Review explicitly flagged the
      previous white screen as Guideline 2.1(a) "blank screen on launch".

      All styles are inline (zero external dependencies) so this works
      even if the CSS bundle hasn't loaded yet.
    -->
    <div id="root">
      <div id="cr-boot-fallback" dir="rtl" style="
        position:fixed;inset:0;display:flex;flex-direction:column;
        align-items:center;justify-content:center;
        background:#16A34A;color:#FFFFFF;font-family:system-ui,-apple-system,sans-serif;
        z-index:0;">
        <div style="
          width:64px;height:64px;border-radius:50%;
          background:#FFFFFF;display:flex;align-items:center;justify-content:center;
          margin-bottom:20px;box-shadow:0 4px 16px rgba(0,0,0,0.15);">
          <div style="
            width:32px;height:32px;border:3px solid #D8E5D9;
            border-top-color:#2D5233;border-radius:50%;
            animation:cr-boot-spin 0.8s linear infinite;"></div>
        </div>
        <div style="font-size:20px;font-weight:800;letter-spacing:0.3px;margin-bottom:6px;">
          CarReminders
        </div>
        <div style="font-size:13px;opacity:0.85;">טוען...</div>
      </div>
    </div>
    <style>
      @keyframes cr-boot-spin { to { transform: rotate(360deg); } }
    </style>
    <!--
      Static legal footer. Lives OUTSIDE #root so the React app
      (which mounts into #root and may replace its contents) never
      removes it. Two reasons it has to be in the SSR HTML, not just
      inside a React component:

        1. Google's OAuth verification crawler grades the home page
           by parsing the raw HTML response and looking for an
           anchor tag whose href ends with the declared Privacy
           Policy URL. The "Issues found during branding review"
           dialog explicitly flagged the absence of this link on
           car-reminder.app (2026-05-15). Putting the link inside a
           React component means a non-JS crawler sees an empty
           shell and the verification keeps failing.

        2. Even with full client-side React, the AuthPage already
           buries Privacy/Terms in the sign-up form. Surfacing them
           at the bottom of every public page (not just the form)
           is the standard convention App Store + Play Store
           reviewers expect to see.

      Hidden on the native app shell (Capacitor) via the
      `.capacitor-platform` class that capacitor.js sets on <body>
      during boot — there's no point showing "© CarReminder" inside
      the wrapped app, only the web build needs it.
    -->
    <footer id="cr-legal-footer" dir="rtl" style="
      position:relative;z-index:1;
      padding:32px 16px 24px;
      background:#F9FAFB;
      border-top:1px solid #E5E7EB;
      text-align:center;
      font-family:system-ui,-apple-system,sans-serif;
      font-size:13px;color:#6B7280;line-height:1.6;">
      <div style="max-width:640px;margin:0 auto;">
        <div style="margin-bottom:8px;font-weight:600;color:#374151;">
          CarReminder · אפליקציה לניהול רכבים
        </div>
        <nav>
          <a href="/PrivacyPolicy" style="color:#2D5233;text-decoration:none;margin:0 6px;">מדיניות פרטיות</a>
          <span style="color:#D1D5DB;">·</span>
          <a href="/TermsOfService" style="color:#2D5233;text-decoration:none;margin:0 6px;">תנאי שימוש</a>
          <span style="color:#D1D5DB;">·</span>
          <a href="/Contact" style="color:#2D5233;text-decoration:none;margin:0 6px;">צור קשר</a>
        </nav>
        <div style="margin-top:10px;font-size:11px;color:#9CA3AF;">
          © 2026 CarReminder · כל הזכויות שמורות
        </div>
      </div>
    </footer>
    <style>
      /* The footer is web-only. main.jsx sets html.native-app on the
         <html> element early in boot when isNative is true (Capacitor
         iOS/Android), so we hide the footer for those runtimes via
         the existing class instead of inventing a new flag. The
         static markup still ships in the SSR HTML for Google's OAuth
         consent screen crawler — the only consumer that requires
         it. */
      html.native-app #cr-legal-footer { display: none; }
    </style>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
